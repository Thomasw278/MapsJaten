<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Maps Warga Jaten | KKN ISL UKDW 2026</title>
  <meta name="description" content="Maps Warga Jaten merupakan peta digital interaktif rumah warga Padukuhan Jaten yang dibuat oleh mahasiswa KKN ISL UKDW 2026.">
  <meta name="author" content="KKN ISL UKDW 2026">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Maps Warga Jaten">
  <meta property="og:description" content="Peta digital interaktif rumah warga Padukuhan Jaten.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thomasw278.github.io/MapsJaten/">
  <link rel="canonical" href="https://thomasw278.github.io/MapsJaten/">
  
  <link rel="icon" type="image/x-icon" href="Logo_ISL.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-badge">
      <div class="header-badge-icon">
        <img src="Logo_ISL.png" width="26" height="26" alt="Logo">
      </div>
      <div class="header-badge-text">Jaten</div>
    </div>
    <div class="header-sep"></div>
    <div class="header-title">
      <h1>
        <span class="judul-full">Peta Rumah & Fasilitas Warga Jaten</span>
        <span class="judul-short">Maps Jaten</span>
      </h1>
      <p>KKN ISL UKDW 2026 | Kelompok Jaten</p>
    </div>
  </div>
  <div class="header-right">
    <div class="layer-toggle">
      <button class="layer-btn" data-layer="osm">Peta</button>
      <button class="layer-btn active" data-layer="satelit">Satelit</button>
      <button class="layer-btn" data-layer="hybrid">Hybrid</button>
    </div>
    <div class="stat-chip">🏠 <span class="stat-chip-num" id="count-total">0</span> data</div>
    <button class="btn-header btn-primary" onclick="loadData()">🔄 <span>Refresh</span></button>
    <a href="https://docs.google.com/spreadsheets/d/1L2oHu_JmNGSU2ws0hHEKd3lBINgzDyntdt4QucSUPz0/edit?gid=0#gid=0" target="_blank" class="btn-header btn-ghost">📝 <span>Update Data</span></a>
    <button class="btn-hamburger" onclick="toggleMobileSidebar()">☰</button>
  </div>
</header>

<div class="main">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">
        🏠 Daftar Lokasi
        <span class="sidebar-badge" id="sidebar-count">0</span>
      </span>
      <button onclick="tutupSidebar()" class="btn-close-sidebar">✕</button>
    </div>
    
    <div class="sidebar-search">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="searchInput" placeholder="Cari Nama Warga / Lokasi">
      </div>
    </div>

    <div class="filter-chips">
      <button class="filter-chip active" data-cat="all">Semua</button>
      <button class="filter-chip" data-cat="sangkar"><img src="Bird Image.png" class="chip-icon" alt="Sangkar"> Sangkar</button>
      <button class="filter-chip" data-cat="masjid">🕌 Ibadah</button>
      <button class="filter-chip" data-cat="lapangan">⚽ Fasum</button>
    </div>

    <div class="sidebar-list" id="sidebarList">
      <div class="empty-state"><div class="emoji">⏳</div><p>Memuat data...</p></div>
    </div>
  </div>

  <div class="map-wrap">
    <button class="btn-toggle-sidebar" id="btnToggle" onclick="toggleSidebar()">◀</button>
    
    <div class="mobile-layer-bar">
      <button class="layer-btn" data-layer="osm">Peta</button>
      <button class="layer-btn active" data-layer="satelit">Satelit</button>
      <button class="layer-btn" data-layer="hybrid">Hybrid</button>
    </div>

    <div id="map"></div>
    
    <div class="legend-float">
      <div class="legend-item"><span class="legend-dot"></span> Warga</div>
      <div class="legend-item"><img src="Bird Image.png" class="legend-icon" alt="Sangkar"> Sangkar</div>
      <div class="legend-item"><span>🕌</span> Ibadah</div>
      <div class="legend-item"><span>⚽</span> Fasum</div>
    </div>

    <div class="compass-container" title="Klik untuk reset ke arah Utara">
      <div class="compass-dial">
        <span class="dir north">U</span>
        <span class="dir east">T</span>
        <span class="dir south">S</span>
        <span class="dir west">B</span>
        <div class="compass-needle"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCzUF7Y-JgYSG67qGNFhRjSixzjh3QvUGKm7VRVzwTvWzSxe92o5yyjTp9XGAC0Op5jSCSADwYCAe6/pub?gid=0&single=true&output=csv";

var dataWarga = [];
var searchQuery = "";
var activeCategory = "all";
var selectedId = null;
var markers = {};

var tileLayers = {
  osm:    L.tileLayer("https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}", { attribution:"© Google Maps", maxZoom:20 }),
  satelit:L.tileLayer("https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}", { attribution:"© Google Maps", maxZoom:20 }),
  hybrid: L.tileLayer("https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}", { attribution:"© Google Maps", maxZoom:20 })
};

var map = L.map("map", { zoomControl:true }).setView([-7.8012, 110.2804], 15);
tileLayers.satelit.addTo(map);

var compassDial = document.querySelector('.compass-dial');
var lastCenter = map.getCenter();
var ticking = false;

function updateCompassRotation() {
  var currentCenter = map.getCenter();
  var dy = currentCenter.lat - lastCenter.lat;
  var dx = currentCenter.lng - lastCenter.lng;

  if (Math.abs(dx) > 0.000005 || Math.abs(dy) > 0.000005) {
    var angle = Math.atan2(dx, dy) * (180 / Math.PI);
    compassDial.style.setProperty('--compass-angle', angle + 'deg');
  }
  ticking = false;
}

map.on('move', function() {
  if (!ticking) {
    window.requestAnimationFrame(updateCompassRotation);
    ticking = true;
  }
});

map.on('moveend', function() {
  lastCenter = map.getCenter();
});

if (compassDial) {
  compassDial.addEventListener('click', function() {
    lastCenter = map.getCenter();
    compassDial.style.setProperty('--compass-angle', '0deg');
    tampilToast("🧭 Kompas direset ke arah Utara");
  });
}

var layerAktif = "satelit";
document.querySelectorAll(".layer-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    var layer = btn.dataset.layer;
    if(layer === layerAktif) return;
    map.removeLayer(tileLayers[layerAktif]);
    tileLayers[layer].addTo(map);
    layerAktif = layer;
    document.querySelectorAll(".layer-btn").forEach(function(b){ b.classList.remove("active"); });
    document.querySelectorAll("[data-layer='"+layer+"']").forEach(function(b){ b.classList.add("active"); });
  });
});

/* ── PARSE CSV DATA ── */
function parseCSV(text) {
  var lines = text.trim().split("\n");
  var headers = lines[0].split("\t").length > 1 ? lines[0].split("\t") : lines[0].split(",");
  headers = headers.map(function(h){ return h.trim().replace(/^"|"$/g,"").toLowerCase(); });
  var result = [];
  for(var i=1; i<lines.length; i++) {
    if(!lines[i].trim()) continue;
    var cols = []; var cur = ""; var inQuote = false;
    var sep = lines[i].indexOf("\t") >= 0 ? "\t" : ",";
    for(var c=0; c<lines[i].length; c++) {
      var ch = lines[i][c];
      if(ch==='"') { inQuote = !inQuote; }
      else if(ch===sep && !inQuote) { cols.push(cur.trim()); cur=""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    var obj = {};
    headers.forEach(function(h, idx){ obj[h] = (cols[idx]||"").replace(/^"|"$/g,"").trim(); });
    var nama = obj["nama warga"]||obj.nama||"";
    if(!nama) continue;
    result.push({
      id: parseInt(obj.id)||i,
      nama: nama,
      alamat: obj.alamat||"-",
      pekerjaan: obj.pekerjaan||"-",
      gender: obj.gender||"-",
      anggota: obj["jumlah anggota keluarga"]||obj.anggota||"-",
      lat: parseFloat(obj.lat)||0,
      lng: parseFloat(obj.lng)||0
    });
  }
  return result;
}

function getInisial(nama) {
  return nama.split(" ").slice(0,2).map(function(w){ return w[0]||""; }).join("").toUpperCase();
}

function isMasjid(p, nama) {
  var str = (p + " " + nama).toLowerCase();
  return str.includes("masjid") || str.includes("musholla") || str.includes("musolla");
}

function isLapangan(p, nama) {
  var str = (p + " " + nama).toLowerCase();
  return str.includes("lapangan") || str.includes("stadion");
}

function isSangkar(p) {
  return p.toLowerCase().includes("sangkar burung");
}

function getCategoryClass(d) {
  if (isMasjid(d.pekerjaan, d.nama)) return "masjid";
  if (isLapangan(d.pekerjaan, d.nama)) return "lapangan";
  if (isSangkar(d.pekerjaan)) return "sangkar";
  return "";
}

function buatIcon(d) {
  var cat = getCategoryClass(d);
  if (cat === "masjid") {
    return L.divIcon({ className: "", html: "<div class='marker-icon-bird'>🕌</div>", iconSize: [26, 26], iconAnchor: [13, 13] });
  }
  if (cat === "lapangan") {
    return L.divIcon({ className: "", html: "<div class='marker-icon-bird'>⚽</div>", iconSize: [26, 26], iconAnchor: [13, 13] });
  }
  if (cat === "sangkar") {
    return L.divIcon({
      className: "",
      html: "<div class='marker-icon-bird-wrap'><img src='Bird Image.png' class='marker-bird-img' alt='Sangkar'></div>",
      iconSize: [30, 30], iconAnchor: [15, 15]
    });
  }
  return L.divIcon({ className: "", html: "<div class='marker-icon-dot'></div>", iconSize: [14, 14], iconAnchor: [7, 7] });
}

function buatPopup(d) {
  var gmapsUrl = "https://www.google.com/maps?q="+d.lat+","+d.lng;
  var cat = getCategoryClass(d);
  var catClass = cat ? " " + cat : "";
  
  var iconPrefix = "";
  if (cat === "masjid") iconPrefix = "🕌 ";
  else if (cat === "lapangan") iconPrefix = "⚽ ";
  else if (cat === "sangkar") iconPrefix = "<img src='Bird Image.png' class='inline-bird-icon' alt='Sangkar'> ";

  var avatarText = cat === "masjid" ? "🕌" : (cat === "lapangan" ? "⚽" : (cat === "sangkar" ? "<img src='Bird Image.png' class='avatar-bird-img' alt='Sangkar'>" : getInisial(d.nama)));

  return "<div class='popup-wrap'>"
    +"<div class='popup-header"+catClass+"'>"
    +"<div class='popup-avatar-wrap'>"+avatarText+"</div>"
    +"<div><div class='popup-nama'>"+d.nama+"</div></div>"
    +"</div>"
    +"<div class='popup-body'>"
    +"<div class='popup-row'><span class='popup-label'>Alamat</span><span class='popup-val'>"+d.alamat+"</span></div>"
    +"<div class='popup-row'><span class='popup-label'>Keterangan</span><span class='popup-val'>"+iconPrefix+d.pekerjaan+"</span></div>"
    +"<a href='"+gmapsUrl+"' target='_blank' class='popup-gmaps"+catClass+"'>📍 Buka di Google Maps</a>"
    +"</div></div>";
}

function tambahMarker(d) {
  if(!d.lat || !d.lng) return;
  markers[d.id] = L.marker([d.lat, d.lng], {icon: buatIcon(d)})
    .addTo(map).bindPopup(buatPopup(d), {maxWidth: 300});
}

function applyFilters() {
  var filtered = dataWarga.filter(function(d) {
    var cat = getCategoryClass(d);
    var matchCat = (activeCategory === "all") || (activeCategory === cat);
    var matchSearch = d.nama.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0
        || d.alamat.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0
        || d.pekerjaan.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0;
    return matchCat && matchSearch;
  });

  dataWarga.forEach(function(d) {
    var cat = getCategoryClass(d);
    var matchCat = (activeCategory === "all") || (activeCategory === cat);
    var matchSearch = d.nama.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0
        || d.alamat.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0
        || d.pekerjaan.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0;

    if (markers[d.id]) {
      if (matchCat && matchSearch) {
        if (!map.hasLayer(markers[d.id])) map.addLayer(markers[d.id]);
      } else {
        if (map.hasLayer(markers[d.id])) map.removeLayer(markers[d.id]);
      }
    }
  });

  renderSidebar(filtered);
}

function renderSidebar(filteredList) {
  var list = document.getElementById("sidebarList");
  document.getElementById("sidebar-count").textContent = filteredList.length;
  
  if(!filteredList.length) {
    list.innerHTML = "<div class='empty-state'><div class='emoji'>🔍</div><p>Tidak ada data ditemukan</p></div>";
    return;
  }
  
  var html = "";
  filteredList.forEach(function(d) {
    var cat = getCategoryClass(d);
    var catClass = cat ? " " + cat : "";
    var iconPrefix = "";
    if (cat === "masjid") iconPrefix = "🕌 ";
    else if (cat === "lapangan") iconPrefix = "⚽ ";
    else if (cat === "sangkar") iconPrefix = "<img src='Bird Image.png' class='inline-bird-icon' alt='Sangkar'> ";

    var avatarText = cat === "masjid" ? "🕌" : (cat === "lapangan" ? "⚽" : (cat === "sangkar" ? "<img src='Bird Image.png' class='avatar-bird-img' alt='Sangkar'>" : getInisial(d.nama)));

    html += "<div class='warga-card"+(selectedId===d.id?" selected":"")+"' onclick='pilihWarga("+d.id+")'>"
      +"<div class='warga-avatar"+catClass+"'>"+avatarText+"</div>"
      +"<div class='warga-info'>"
      +"<div class='warga-nama'>"+d.nama+"</div>"
      +"<div class='warga-meta'>"+d.alamat+"</div>"
      +"<span class='warga-pill"+catClass+"'>"+iconPrefix+d.pekerjaan+"</span>"
      +"</div></div>";
  });
  list.innerHTML = html;
}

function pilihWarga(id) {
  selectedId = id;
  var d = dataWarga.find(function(x){ return x.id===id; });
  if(!d || !d.lat || !d.lng) return;
  map.setView([d.lat, d.lng], 18, {animate:true});
  if(markers[id]) markers[id].openPopup();
  applyFilters();
  if(window.innerWidth <= 640) toggleMobileSidebar(false);
}

function updateStats() {
  document.getElementById("count-total").textContent = dataWarga.length;
  document.getElementById("sidebar-count").textContent = dataWarga.length;
}

function loadData() {
  var list = document.getElementById("sidebarList");
  list.innerHTML = "<div class='empty-state'><div class='emoji'>⏳</div><p>Memuat data...</p></div>";
  fetch(SHEETS_URL)
    .then(function(r){ return r.text(); })
    .then(function(csv) {
      dataWarga = parseCSV(csv);
      Object.keys(markers).forEach(function(k){ map.removeLayer(markers[k]); });
      markers = {};
      dataWarga.forEach(function(d){ tambahMarker(d); });
      var valid = dataWarga.filter(function(d){ return d.lat && d.lng; });
      if(valid.length > 0) {
        var cLat = valid.reduce(function(s,d){return s+d.lat;},0)/valid.length;
        var cLng = valid.reduce(function(s,d){return s+d.lng;},0)/valid.length;
        map.setView([cLat, cLng], 16, {animate:true});
      }
      updateStats(); 
      applyFilters();
      tampilToast("Total Data Loaded : "+dataWarga.length);
    })
    .catch(function() {
      list.innerHTML = "<div class='empty-state'><div class='emoji'>❌</div><p>Gagal memuat data</p></div>";
    });
}

document.getElementById("searchInput").addEventListener("input", function(e) { 
  searchQuery = e.target.value; 
  applyFilters(); 
});

document.querySelectorAll(".filter-chip").forEach(function(chip) {
  chip.addEventListener("click", function() {
    activeCategory = chip.dataset.cat;
    document.querySelectorAll(".filter-chip").forEach(function(c){ c.classList.remove("active"); });
    chip.classList.add("active");
    applyFilters();
  });
});

function tampilToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2800);
}

function toggleSidebar() {
  var sidebar = document.getElementById("sidebar");
  var btn = document.getElementById("btnToggle");
  sidebar.classList.toggle("hidden");
  btn.textContent = sidebar.classList.contains("hidden") ? "▶" : "◀";
  setTimeout(function(){ map.invalidateSize(); }, 300);
}

function toggleMobileSidebar(forceClose) {
  var sidebar = document.getElementById("sidebar");
  var overlay = document.getElementById("sidebarOverlay");
  var isOpen = sidebar.classList.contains("mobile-open");
  if(forceClose === false || isOpen) {
    sidebar.classList.remove("mobile-open");
    overlay.classList.remove("show");
  } else {
    sidebar.classList.add("mobile-open");
    overlay.classList.add("show");
  }
  setTimeout(function(){ map.invalidateSize(); }, 300);
}

function tutupSidebar() {
  if(window.innerWidth <= 640) { toggleMobileSidebar(false); } else { toggleSidebar(); }
}

loadData();
</script>
</body>
</html>
